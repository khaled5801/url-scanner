<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Scanner - Advanced URL Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a4d2e;
            --primary-light: #2d7a4a;
            --accent: #52b788;
            --accent-light: #74c69d;
            --dark: #0f1419;
            --darker: #0a0d11;
            --text: #e8f5e9;
            --text-secondary: #b0d5b8;
            --border: #2d7a4a;
            --success: #52b788;
            --warning: #d4a574;
            --danger: #c1666b;
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, #1a2f24 100%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 20, 25, 0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px;
            box-shadow: 
                0 20px 60px rgba(45, 122, 74, 0.1),
                inset 0 1px 0 rgba(82, 183, 136, 0.1);
            backdrop-filter: blur(20px);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent-light);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95em;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(45, 122, 74, 0.08);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        input[type="text"]:focus {
            background: rgba(45, 122, 74, 0.12);
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 14px 28px;
            background: var(--primary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            letter-spacing: 0.3px;
        }

        button:hover:not(:disabled) {
            background: var(--primary-light);
            border-color: var(--accent-light);
            box-shadow: 0 8px 24px rgba(82, 183, 136, 0.15);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .scan-btn {
            flex: 1;
        }

        .preview-btn {
            background: var(--primary-light);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 60px 0;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--accent);
            font-size: 0.9em;
            font-weight: 500;
        }

        .results {
            display: none;
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 40px;
            animation: slideIn 0.4s ease-out;
        }

        .results.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            margin-bottom: 30px;
            padding: 24px;
            background: rgba(45, 122, 74, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: rgba(45, 122, 74, 0.08);
        }

        .result-title {
            font-size: 1.1em;
            color: var(--accent-light);
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .risk-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            margin: 12px 0;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .risk-safe {
            background: rgba(82, 183, 136, 0.15);
            color: var(--accent-light);
            border: 1px solid var(--accent);
        }

        .risk-suspicious {
            background: rgba(212, 165, 116, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .risk-dangerous {
            background: rgba(193, 102, 107, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .score-container {
            margin: 20px 0;
        }

        .score-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .score-value {
            color: var(--accent-light);
            font-weight: 600;
            font-size: 1.1em;
        }

        .score-bar {
            width: 100%;
            height: 6px;
            background: rgba(45, 122, 74, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, var(--accent-light) 100%);
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .score-fill.suspicious {
            background: linear-gradient(90deg, var(--warning) 0%, #e8b982 100%);
        }

        .score-fill.dangerous {
            background: linear-gradient(90deg, var(--danger) 0%, #d97d82 100%);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin: 18px 0;
        }

        .stat-box {
            background: rgba(45, 122, 74, 0.08);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(45, 122, 74, 0.12);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--accent-light);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .stat-box.malicious .stat-number {
            color: var(--danger);
        }

        .stat-box.suspicious .stat-number {
            color: var(--warning);
        }

        .threat-list {
            list-style: none;
        }

        .threat-item {
            padding: 10px 12px;
            margin: 8px 0;
            background: rgba(193, 102, 107, 0.08);
            border-left: 2px solid var(--danger);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.9em;
        }

        .info-list {
            list-style: none;
        }

        .info-item {
            padding: 10px 12px;
            margin: 8px 0;
            background: rgba(82, 183, 136, 0.05);
            border-left: 2px solid var(--accent);
            border-radius: 4px;
            color: var(--text);
            word-break: break-all;
            font-size: 0.9em;
        }

        .redirect-chain {
            background: rgba(212, 165, 116, 0.08);
            padding: 16px;
            border-radius: 6px;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .redirect-url {
            background: rgba(45, 122, 74, 0.12);
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 4px;
            color: var(--text-secondary);
            word-break: break-all;
            font-size: 0.85em;
            border-left: 2px solid var(--warning);
        }

        .redirect-arrow {
            text-align: center;
            color: var(--warning);
            font-weight: 500;
            margin: 6px 0;
            font-size: 0.8em;
        }

        .screenshot-section {
            margin-top: 16px;
        }

        .screenshot-img {
            max-width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 400px;
            background: var(--darker);
            margin-top: 12px;
        }

        .error-message {
            padding: 16px;
            background: rgba(193, 102, 107, 0.1);
            border-left: 2px solid var(--danger);
            border-radius: 6px;
            color: var(--text);
            margin: 16px 0;
            font-size: 0.9em;
        }

        code {
            background: rgba(45, 122, 74, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--accent-light);
            font-size: 0.85em;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .input-section {
                flex-direction: column;
            }

            .button-group {
                width: 100%;
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Security Scanner</h1>
            <p>Advanced URL Threat Analysis & Detection</p>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="Enter URL (e.g., https://example.com)"
                    autocomplete="off"
                >
            </div>
            <div class="button-group">
                <button class="scan-btn" onclick="scanURL()">Scan URL</button>
                <button class="preview-btn" onclick="previewURL()">Preview</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Analyzing URL...</div>
        </div>

        <div class="results" id="results"></div>

        <div class="footer">
            <p>Safe & Secure Analysis - No Direct Access Required</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        async function scanURL() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showError('Please enter a valid URL');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            loading.classList.add('active');
            results.classList.remove('active');

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) {
                    throw new Error(`Error: ${response.statusText}`);
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                showError(`Connection Error: ${error.message}`);
                console.error('Error:', error);
            } finally {
                loading.classList.remove('active');
            }
        }

        function previewURL() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showError('Please enter a valid URL');
                return;
            }

            const fullURL = url.startsWith(('http://', 'https://')) ? url : 'https://' + url;
            window.open(fullURL, '_blank');
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            let html = '';

            const riskClass = data.overall_risk === 'SAFE' ? 'safe' : 
                            data.overall_risk === 'SUSPICIOUS' ? 'suspicious' : 'dangerous';

            html += `
                <div class="result-item">
                    <div class="result-title">Risk Assessment</div>
                    <div class="risk-badge risk-${riskClass}">
                        ${data.overall_risk}
                    </div>
                    <div class="score-container">
                        <div class="score-label">
                            <span>Risk Score</span>
                            <span class="score-value">${data.risk_score}/100</span>
                        </div>
                        <div class="score-bar">
                            <div class="score-fill ${riskClass}" style="width: ${data.risk_score}%"></div>
                        </div>
                    </div>
                </div>
            `;

            if (data.virustotal) {
                html += `
                    <div class="result-item">
                        <div class="result-title">VirusTotal Analysis</div>
                        <div class="stat-grid">
                            <div class="stat-box malicious">
                                <div class="stat-number">${data.virustotal.malicious}</div>
                                <div class="stat-label">Malicious</div>
                            </div>
                            <div class="stat-box suspicious">
                                <div class="stat-number">${data.virustotal.suspicious}</div>
                                <div class="stat-label">Suspicious</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-number">${data.virustotal.harmless}</div>
                                <div class="stat-label">Safe</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-number">${data.virustotal.undetected}</div>
                                <div class="stat-label">Undetected</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (data.ssl_check) {
                html += `
                    <div class="result-item">
                        <div class="result-title">SSL Certificate</div>
                        <ul class="info-list">
                            <li class="info-item">${data.ssl_check.message}</li>
                            ${data.ssl_check.issuer ? `<li class="info-item">Issuer: ${data.ssl_check.issuer}</li>` : ''}
                        </ul>
                    </div>
                `;
            }

            if (data.redirects && data.redirects.found) {
                html += `
                    <div class="result-item">
                        <div class="result-title">Redirects</div>
                        <div class="redirect-chain">
                `;
                
                data.redirects.redirects.forEach((redirect) => {
                    html += `
                        <div class="redirect-url">${redirect.from}</div>
                        <div class="redirect-arrow">→</div>
                    `;
                });
                html += `
                        <div class="redirect-url">${data.redirects.redirects[data.redirects.redirects.length - 1].to}</div>
                        </div>
                    </div>
                `;
            }

            if (data.malicious_patterns && data.malicious_patterns.found) {
                html += `
                    <div class="result-item">
                        <div class="result-title">Detected Patterns</div>
                        <ul class="threat-list">
                `;
                
                data.malicious_patterns.patterns.forEach(pattern => {
                    html += `<li class="threat-item">${pattern}</li>`;
                });
                
                html += `</ul></div>`;
            }

            if (data.injection_check && data.injection_check.found) {
                html += `
                    <div class="result-item">
                        <div class="result-title">Injection Threats</div>
                        <ul class="threat-list">
                `;
                
                data.injection_check.threats.forEach(threat => {
                    html += `<li class="threat-item">${threat}</li>`;
                });
                
                html += `</ul></div>`;
            }

            if (data.screenshot) {
                html += `
                    <div class="result-item screenshot-section">
                        <div class="result-title">Website Preview</div>
                        <img src="data:image/png;base64,${data.screenshot}" alt="Website Screenshot" class="screenshot-img">
                    </div>
                `;
            }

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
        }

        function showError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="error-message">${message}</div>`;
            resultsDiv.classList.add('active');
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                scanURL();
            }
        });

        window.addEventListener('load', function() {
            document.getElementById('urlInput').focus();
        });
    </script>
</body>
</html>
